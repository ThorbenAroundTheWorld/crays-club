    <script>
      (function () {
        var menu = document.querySelector("[data-booking-account-menu]");
        var button = document.querySelector("[data-booking-account-menu-button]");
        var dropdown = document.querySelector("[data-booking-account-dropdown]");
        if (!menu || !button || !dropdown) return;
        button.addEventListener("click", function (event) {
          event.stopPropagation();
          var open = dropdown.hidden;
          dropdown.hidden = !open;
          button.setAttribute("aria-expanded", open ? "true" : "false");
        });
        document.addEventListener("click", function (event) {
          if (menu.contains(event.target)) return;
          dropdown.hidden = true;
          button.setAttribute("aria-expanded", "false");
        });
        document.addEventListener("keydown", function (event) {
          if (event.key !== "Escape") return;
          dropdown.hidden = true;
          button.setAttribute("aria-expanded", "false");
        });
      }());
    </script>
